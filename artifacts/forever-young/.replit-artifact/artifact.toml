kind = "web"
previewPath = "/"
title = "Forever Young Aesthetic & Beauty Studio"
version = "1.0.0"
id = "artifacts/forever-young"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21101

[services.development]
run = "pnpm --filter @workspace/forever-young run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forever-young", "run", "build" ]
publicDir = "artifacts/forever-young/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21101"
BASE_PATH = "/"
